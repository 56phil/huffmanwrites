{{ define "main" }}
<div class="shop-container">
  <header class="shop-header">
    <h1>{{ .Title }}</h1>
    <p class="shop-subtitle">{{ .Params.description }}</p>
  </header>

  <div class="credo-banner">
    <div class="credo-line"><span class="credo-verb">Think</span> clearly.</div>
    <div class="credo-line"><span class="credo-verb">Live</span> deliberately.</div>
    <div class="credo-line"><span class="credo-verb">Love</span> intensely.</div>
  </div>

  <div class="product-grid">
    {{ range .Pages }}
    <div class="product-card">
      <div class="product-image">
        {{ with .Params.image }}
          <img src="{{ . }}" alt="{{ $.Title }} product" loading="lazy">
        {{ end }}
      </div>
      <div class="product-info">
        <h2>{{ .Title }}</h2>
        <p class="product-description">{{ .Params.description }}</p>
        <div class="product-price">{{ .Params.price }}</div>
        <a href="{{ .Params.link }}" class="product-button">Shop Now</a>
      </div>
    </div>
    {{ end }}
  </div>
</div>

<style>
  .shop-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }

  .shop-header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .shop-header h1 {
    font-size: 2.5rem;
    color: var(--primary);
    margin-bottom: 0.5rem;
  }

  .shop-subtitle {
    font-size: 1.1rem;
    color: var(--secondary);
    max-width: 600px;
    margin: 0 auto;
  }

  .credo-banner {
    background: var(--entry);
    padding: 2rem;
    border-radius: 8px;
    margin-bottom: 3rem;
    text-align: center;
    border: 1px solid var(--border);
  }

  .credo-line {
    font-size: 1.8rem;
    font-style: italic;
    margin-bottom: 0.5rem;
    color: var(--primary);
  }

  .credo-verb {
    font-variant: small-caps;
    font-weight: 600;
  }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 2rem;
    margin-top: 2rem;
  }

  .product-card {
    background: var(--entry);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .product-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
  }

  .product-image img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    display: block;
  }

  .product-info {
    padding: 1.5rem;
  }

  .product-info h2 {
    font-size: 1.3rem;
    margin-bottom: 0.5rem;
    color: var(--primary);
  }

  .product-description {
    color: var(--secondary);
    font-size: 0.95rem;
    line-height: 1.5;
    margin-bottom: 1rem;
  }

  .product-price {
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--primary);
    margin-bottom: 1rem;
  }

  .product-button {
    display: inline-block;
    background: var(--primary);
    color: var(--theme);
    padding: 0.6rem 1.5rem;
    border-radius: 4px;
    text-decoration: none;
    font-weight: 600;
    transition: opacity 0.2s ease;
  }

  .product-button:hover {
    opacity: 0.85;
  }

  @media (max-width: 768px) {
    .product-grid {
      grid-template-columns: 1fr;
    }

    .credo-line {
      font-size: 1.5rem;
    }
  }
</style>
{{ end }}
